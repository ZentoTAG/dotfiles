# ============================================================
#  HYPRLAND CONFIG — zento
#  Окружение: CachyOS + Hyprland
# ============================================================

# ------------------------------------------------------------
#  ПЕРЕМЕННЫЕ ОКРУЖЕНИЯ (NVIDIA + PROXY)
# ------------------------------------------------------------

# NVIDIA (обязательно для правильной работы)
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = LIBVA_DRIVER_NAME,nvidia

# Wayland / Electron
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = QT_QPA_PLATFORMTHEME,qt6ct

# Сессия
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# Прокси (v2rayN)
env = http_proxy,http://127.0.0.1:10808
env = https_proxy,http://127.0.0.1:10808
env = all_proxy,socks5://127.0.0.1:10808
env = no_proxy,localhost,127.0.0.1,::1

# ------------------------------------------------------------
#  АВТОЗАПУСК
# ------------------------------------------------------------

exec-once = /usr/lib/polkit-kde-authentication-agent-1   # Политики KDE
exec-once = dunst                                         # Уведомления
exec-once = hyprpaper                                     # Обои
exec-once = waybar                                        # Панель
exec-once = udiskie                                       # Автомонтирование
exec-once = swaybg -i /home/zento/main/media/wallpapers/1342977.jpeg -m fill
exec-once = [workspace 9 silent] /home/zento/main/programms/v2rayN-linux-64/v2rayN
exec-once = [workspace 1] firefox
exec-once = [workspace 2] telegram-desktop

# ------------------------------------------------------------
#  МОНИТОРЫ
# ------------------------------------------------------------

monitor = DP-1, 1920x1080@180, 0x0, 1

# ------------------------------------------------------------
#  ГОРЯЧИЕ КЛАВИШИ
# ------------------------------------------------------------

# --- Приложения ---
bind = SUPER, Q, exec, kitty
bind = SUPER, Return, exec, kitty
bind = SUPER, R, exec, wofi --show drun
bind = SUPER, E, exec, thunar
bind = ALT, K, exec, hyprshot -m region
bind = SUPER, Print, exec, hyprshot -m window
bind = SUPER, b, exec, kitty --title btop -e btop

# --- Управление окнами ---
bind = SUPER, C, killactive                  # Закрыть окно
bind = SUPER, F, fullscreen                  # Полноэкранный режим
bind = SUPER, S, togglefloating              # Плавающий режим
bind = SUPER, L, exec, wlogout -p layer-shell -b 3 -c 50 -r 0 -m 50 -T 400 -B 400 -L 250 -R 250

# --- Навигация (Vim-стиль) ---
bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d

# --- Перемещение окон ---
bind = SUPER SHIFT, left, movewindow, l
bind = SUPER SHIFT, right, movewindow, r
bind = SUPER SHIFT, up, movewindow, u
bind = SUPER SHIFT, down, movewindow, d

# --- Изменение размера окон ---
bind = SUPER CTRL, left, resizeactive, -150 0
bind = SUPER CTRL, right, resizeactive, 150 0
bind = SUPER CTRL, up, resizeactive, 0 -150
bind = SUPER CTRL, down, resizeactive, 0 150

# --- Макеты окон ---
bind = SUPER, T, layoutmsg, togglesplit      # Вертикаль / Горизонталь
bind = SUPER, G, layoutmsg, dwindle          # Каскадный макет
bind = SUPER, H, layoutmsg, master           # Мастер-слейв

# --- Рабочие столы ---
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9

bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9

# --- Навигация по столам ---
bind = SUPER, TAB, workspace, m+1
bind = SUPER SHIFT, TAB, workspace, m-1

# --- Выход из системы ---
bind = SUPER, X, exec, notify-send "Выход" "Нажми SUPER+SHIFT+Q для выхода"
bind = SUPER SHIFT, Q, exec, hyprctl dispatch exit

# --- Громкость ---
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# ------------------------------------------------------------
#  ПРАВИЛА ДЛЯ ОКОН
# ------------------------------------------------------------

windowrule = match:class .*v2rayN.*, workspace 9 silent

# ------------------------------------------------------------
#  ВВОД (КЛАВИАТУРА)
# ------------------------------------------------------------

input {
    kb_layout     = us,ru
    kb_options    = grp:alt_shift_toggle
    repeat_rate   = 50
    repeat_delay  = 200
    sensitivity   = 1.0
    accel_profile = flat
}

# ------------------------------------------------------------
#  УПРАВЛЕНИЕ МЫШЬЮ (ПЛАВАЮЩИЕ ОКНА)
# ------------------------------------------------------------

# Двигать окно: зажать SUPER + ЛКМ
bindm = SUPER, mouse:272, movewindow

# Менять размер: зажать SUPER + ПКМ
bindm = SUPER, mouse:273, resizewindow

# ------------------------------------------------------------
#  АНИМАЦИИ
# ------------------------------------------------------------

animations {
    enabled = yes
    bezier  = fast, 0.05, 0.9, 0.1, 1.0
	bezier = overshot, 0.13, 0.99, 0.29, 1.1
	bezier = wind, 0.00, 0.06, 0.00, 1.03
	bezier = easeOutQuart, 0.25, 1, 0.5, 1
	
    animation = windows,      1, 2, fast, popin
    animation = windowsOut,   1, 2, fast, popin
    animation = layers,       1, 1, fast, popin
    animation = workspaces, 1, 2, wind, slide
}

# ------------------------------------------------------------
#  ОФОРМЛЕНИЕ
# ------------------------------------------------------------

decoration {
    blur {
        enabled = false
    }
}

