# ============================================================
#  KITTY TERMINAL CONFIG — РАБОЧАЯ ВЕРСИЯ
#  С правильными биндами и командами
# ============================================================

# ----- Шрифт -----
font_family      JetBrains Mono Nerd Font
font_size        11.0

# ----- Прозрачность -----
background_opacity 0.82
dynamic_background_opacity yes

# ----- Основные цвета -----
foreground           #d3d3d3
background           #1e1e1e
selection_background #3a3a3a
selection_foreground #ffffff

# ----- Палитра -----
color0  #2e2e2e
color8  #4a4a4a
color1  #d4878a
color9  #f07178
color2  #a8c88a
color10 #c3e88d
color3  #d9b86b
color11 #ffcb6b
color4  #8ab4f8
color12 #9ccbff
color5  #b592d4
color13 #c792ea
color6  #8ad4d4
color14 #89ddff
color7  #d3d3d3
color15 #ffffff

# ----- Поведение -----
cursor_shape          block
cursor_blink_interval 0
shell_integration     enabled
scrollback_lines      10000
wheel_scroll_multiplier 5.0
copy_on_select        yes

# ----- БАЗОВЫЕ БИНДЫ (работают всегда) -----
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+f search
map ctrl+shift+r clear_terminal
map ctrl+shift+h show_scrollback

# ----- ВКЛАДКИ (работают) -----
map ctrl+shift+t new_tab
map ctrl+shift+q close_tab          # Закрывает вкладку (если она одна — закроется всё окно)
map ctrl+shift+left previous_tab
map ctrl+shift+right next_tab

# ----- ОКНА (сплиты) -----
map ctrl+shift+n launch --cwd=current --location=hsplit   # Новое окно справа
map ctrl+shift+v launch --cwd=current --location=vsplit   # Новое окно снизу
map ctrl+shift+w close_window                            # Закрыть текущее окно (сплит)
map ctrl+shift+tab next_window
map ctrl+shift+grave previous_window

# ----- ШРИФТ -----
map ctrl+shift+equal change_font_size all +2.0
map ctrl+shift+minus change_font_size all -2.0
map ctrl+shift+backspace change_font_size all 0

# ----- СКРИНШОТ -----
map ctrl+shift+p screenshot --type=window

# ----- ОТКРЫТЬ ССЫЛКУ -----
map ctrl+shift+l open_url

# ----- ЗАПУСК УТИЛИТ (правильный синтаксис) -----
map ctrl+shift+b launch --type=overlay btop
map ctrl+shift+d launch --type=overlay ncdu .
map ctrl+shift+e launch --type=overlay thunar $(pwd)

# ----- ПЕРЕЗАГРУЗКА КОНФИГА -----
map ctrl+shift+f5 load_config_file

# ----- Окна -----
remember_window_size yes
initial_window_width  900
initial_window_height 500

# ----- Отключить звуки -----
enable_audio_bell no

# ----- Шрифты (авто) -----
bold_font          auto
italic_font        auto
bold_italic_font   auto

# ----- Скроллинг и мышь -----
scrollback_fill_enlarged_window no
mouse_hide_wait 2.0
url_color #8ab4f8
url_style curly



map ctrl+shift+e launch --type=overlay sh -c "thunar \$PWD"
